name: Build HP Sales APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-dev python3-pip \
            autoconf automake libtool pkg-config m4 \
            build-essential \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            uuid-dev

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android
          pip install kivy-garden.mapview
          pip install mercantile

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HP-Sales-App-APK
          path: bin/*.apk
